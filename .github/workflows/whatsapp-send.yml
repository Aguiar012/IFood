# .github/workflows/send.yml
name: send

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      WA_TO: "5511932291930"
      WA_TEXT: "Teste do GitHub Actions ✅"
      WA_AUTH_DIR: "wa_auth"
      # >>>>>> USE *SECRET* DO REPOSITÓRIO <<<<<<
      # Formato DataImpulse (sticky + Brasil):
      # http://LOGIN__cr.br:PASSWORD@gw.dataimpulse.com:10000
      WA_PROXY_URL: ${{ secrets.WA_PROXY_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore Baileys auth cache
        uses: actions/cache/restore@v4
        with:
          path: wa_auth
          key: baileys-auth-${{ github.run_id }}
          restore-keys: |
            baileys-auth-

      - name: Install deps
        run: npm i --no-audit --no-fund

      - name: Preflight - testa proxy (mostra IP)
        run: npm run proxy:test

      - name: Send message
        run: npm run send

      - name: Save Baileys auth cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: wa_auth
          key: baileys-auth-${{ github.run_id }}
