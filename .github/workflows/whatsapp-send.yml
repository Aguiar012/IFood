name: WhatsApp — enviar mensagem

on:
  workflow_dispatch:
    inputs:
      text:
        description: "Texto para enviar"
        required: false
        default: "Teste do GitHub Actions ✅"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Restaura a sessão do Baileys se existir (cache mais recente)
      - name: Restore Baileys auth cache
        id: auth-restore
        uses: actions/cache/restore@v4
        with:
          path: wa_auth
          key: baileys-auth-${{ github.run_id }}
          restore-keys: |
            baileys-auth-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci || npm i

      - name: Enviar WhatsApp
        env:
          # seu número (E.164 sem +): 55 11 932291930
          WA_TO: "5511932291930"
          WA_TEXT: "${{ github.event.inputs.text }}"
          WA_AUTH_DIR: "wa_auth"
        run: npm run send

      # Salva/atualiza o cache da sessão para futuros runs (usa uma nova chave a cada run)
      - name: Save Baileys auth cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: wa_auth
          key: baileys-auth-${{ github.run_id }}
