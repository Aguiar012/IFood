# fly.toml app configuration file generated for ifsp-alert-bot-aya on 2026-02-11T15:23:52-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ifsp-alert-bot-aya'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3001'
  TZ = 'America/Sao_Paulo'

[[mounts]]
  source = 'dados_bot'
  destination = '/app/dados_bot'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '60s'
    method = 'GET'
    path = '/status'


